<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Arena - Modern Typing Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            color: white;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background grid */
        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.2;
        }

        /* Floating particles */
        .particles-container {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            50% {
                opacity: 0.5;
                transform: translateY(50vh) scale(1);
            }
            100% {
                transform: translateY(-100vh) scale(0);
                opacity: 0;
            }
        }

        /* Main card */
        .game-container {
            width: 100%;
            max-width: 1100px;
            position: relative;
            z-index: 10;
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.1), rgba(236, 72, 153, 0.1));
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .card:hover::before {
            opacity: 1;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .title-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideInLeft 0.5s ease-out;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .keyboard-icon {
            position: relative;
            width: 2rem;
            height: 2rem;
            color: #c084fc;
        }

        .status-dot {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.7;
            }
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .timer-section {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            animation: slideInRight 0.5s ease-out;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .timer-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .timer-icon {
            width: 1rem;
            height: 1rem;
            color: #c084fc;
        }

        .timer-label {
            font-size: 0.75rem;
            color: #9ca3af;
        }

        .timer-value {
            font-size: 1.5rem;
            font-weight: 700;
            transition: all 0.2s;
        }

        .timer-value.changed {
            transform: scale(1.2);
            color: #c084fc;
        }

        .divider {
            width: 1px;
            height: 2rem;
            background: rgba(255, 255, 255, 0.1);
        }

        .key-hints {
            display: flex;
            gap: 0.25rem;
        }

        .key-hint {
            width: 2.5rem;
            height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            font-family: monospace;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .key-hint.active {
            background: rgba(168, 85, 247, 0.3);
            border-color: rgba(168, 85, 247, 0.8);
            transform: scale(1.1);
        }

        /* Progress bar */
        .progress-container {
            position: relative;
            margin-bottom: 2rem;
        }

        .progress-bar {
            width: 100%;
            height: 1rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            border-radius: 9999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #a855f7, #ec4899, #f97316);
            transition: width 0.3s ease-out;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2));
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }

        .progress-handle {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 1.5rem;
            height: 1.5rem;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: left 0.3s ease-out;
            pointer-events: none;
        }

        .progress-handle-inner {
            width: 0.5rem;
            height: 0.5rem;
            background: #a855f7;
            border-radius: 50%;
        }

        /* Typing area */
        .typing-area {
            position: relative;
            margin-bottom: 2rem;
            transition: transform 0.2s;
        }

        .typing-area:hover {
            transform: scale(1.01);
        }

        .typing-area.active {
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.2);
        }

        .text-display {
            background: rgba(0, 0, 0, 0.6);
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 1.125rem;
            line-height: 1.8;
            backdrop-filter: blur(4px);
            position: relative;
            overflow: hidden;
        }

        .text-display::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(168, 85, 247, 0.1), transparent);
            pointer-events: none;
        }

        .text-char {
            display: inline-block;
            transition: all 0.15s;
        }

        .text-char.correct {
            color: #4ade80;
            font-weight: 700;
        }

        .text-char.incorrect {
            color: #f87171;
            font-weight: 700;
        }

        .text-char.current {
            color: white;
            font-weight: 700;
            position: relative;
            animation: cursorPulse 1s infinite;
        }

        @keyframes cursorPulse {
            0%, 100% {
                transform: scale(1);
                text-shadow: 0 0 0px #fff;
            }
            50% {
                transform: scale(1.1);
                text-shadow: 0 0 10px #a855f7;
            }
        }

        .text-char.current::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(168, 85, 247, 0.2);
            filter: blur(4px);
            border-radius: 2px;
        }

        /* Input area */
        .input-container {
            position: relative;
            margin-top: 1rem;
        }

        .typing-input {
            width: 100%;
            height: 9rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            color: white;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            line-height: 1.5;
            resize: none;
            backdrop-filter: blur(4px);
            transition: all 0.3s;
        }

        .typing-input:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.2);
        }

        .typing-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .key-press-indicator {
            position: absolute;
            top: -2rem;
            right: 1rem;
            background: #a855f7;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            animation: popIn 0.2s ease-out;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.5) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 30px -10px rgba(168, 85, 247, 0.3);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.05));
            transform: translateX(-100%);
            transition: transform 0.5s;
        }

        .stat-card:hover::before {
            transform: translateX(0);
        }

        .stat-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: #9ca3af;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            transition: all 0.2s;
        }

        .stat-value.changed {
            transform: scale(1.2);
        }

        .trend-indicator {
            display: inline-block;
            margin-left: 0.5rem;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-2px);
            }
        }

        /* Action buttons */
        .actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .btn {
            padding: 0.75rem 2rem;
            border-radius: 1rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px -5px rgba(168, 85, 247, 0.5);
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        .btn-primary .icon {
            transition: transform 0.5s;
        }

        .btn-primary:hover .icon {
            transform: rotate(180deg);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .btn-outline:active {
            transform: scale(0.95);
        }

        /* Completion message */
        .completion-message {
            text-align: center;
            margin-top: 1.5rem;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(236, 72, 153, 0.2));
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            border: 1px solid rgba(168, 85, 247, 0.3);
            backdrop-filter: blur(4px);
        }

        .message-text {
            font-size: 1.25rem;
            font-weight: 600;
            background: linear-gradient(135deg, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Achievement badges */
        .achievements {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .achievement-badge {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            animation: popIn 0.3s ease-out;
        }

        .achievement-speed {
            background: linear-gradient(135deg, #fbbf24, #f97316);
            color: black;
        }

        .achievement-accuracy {
            background: linear-gradient(135deg, #4ade80, #10b981);
            color: black;
        }

        /* Achievement popup */
        .achievement-popup {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #fbbf24, #f97316);
            color: black;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 50;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -100%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        /* Particle effect */
        .particle-effect {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle-effect-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, #c084fc, #f472b6);
            border-radius: 50%;
            animation: particle 1.5s ease-out forwards;
        }

        @keyframes particle {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0.8;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(1);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .header {
                flex-direction: column;
                gap: 1rem;
            }
            
            .timer-section {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <!-- Achievement Popup -->
    <div id="achievementPopup" class="achievement-popup" style="display: none;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2z"/>
        </svg>
        <span class="font-bold">Achievement Unlocked!</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2z"/>
        </svg>
    </div>

    <!-- Main Game Container -->
    <div class="game-container">
        <div class="card">
            <!-- Header -->
            <div class="header">
                <div class="title-container">
                    <div class="keyboard-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect>
                            <line x1="6" y1="8" x2="10" y2="8"></line>
                            <line x1="14" y1="8" x2="18" y2="8"></line>
                            <line x1="6" y1="12" x2="6" y2="12"></line>
                            <line x1="10" y1="12" x2="10" y2="12"></line>
                            <line x1="14" y1="12" x2="14" y2="12"></line>
                            <line x1="18" y1="12" x2="18" y2="12"></line>
                            <line x1="6" y1="16" x2="18" y2="16"></line>
                        </svg>
                        <div class="status-dot"></div>
                    </div>
                    <h1>Typing Arena</h1>
                </div>

                <div class="timer-section">
                    <div class="timer-container">
                        <svg class="timer-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        <div>
                            <div class="timer-label">Time Remaining</div>
                            <div id="timerValue" class="timer-value">30s</div>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div class="key-hints">
                        <div class="key-hint">W</div>
                        <div class="key-hint">P</div>
                        <div class="key-hint">M</div>
                    </div>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="progress-container">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill" style="width: 100%"></div>
                </div>
                <div id="progressHandle" class="progress-handle" style="left: 100%">
                    <div class="progress-handle-inner"></div>
                </div>
            </div>

            <!-- Text Display -->
            <div class="typing-area" id="typingArea">
                <div id="textDisplay" class="text-display"></div>
            </div>

            <!-- Input Area -->
            <div class="input-container">
                <textarea 
                    id="typingInput" 
                    class="typing-input" 
                    placeholder="Start typing like a legend..."
                    rows="6"
                ></textarea>
                <div id="keyPressIndicator" class="key-press-indicator" style="display: none;"></div>
            </div>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card" id="statWPM">
                    <div class="stat-header">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="12" y1="18" x2="12" y2="12"></line>
                            <line x1="9" y1="15" x2="15" y2="15"></line>
                        </svg>
                        <span class="stat-label">WPM</span>
                    </div>
                    <div class="stat-value" id="wpmValue">0</div>
                </div>

                <div class="stat-card" id="statAccuracy">
                    <div class="stat-header">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <circle cx="12" cy="12" r="2"></circle>
                        </svg>
                        <span class="stat-label">Accuracy</span>
                    </div>
                    <div class="stat-value" id="accuracyValue">0%</div>
                </div>

                <div class="stat-card" id="statChars">
                    <div class="stat-header">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="4 7 4 4 20 4 20 7"></polyline>
                            <line x1="9" y1="20" x2="15" y2="20"></line>
                            <line x1="12" y1="4" x2="12" y2="20"></line>
                        </svg>
                        <span class="stat-label">Characters</span>
                    </div>
                    <div class="stat-value" id="charsValue">0</div>
                </div>

                <div class="stat-card" id="statWords">
                    <div class="stat-header">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                        </svg>
                        <span class="stat-label">Words</span>
                    </div>
                    <div class="stat-value" id="wordsValue">0</div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="actions">
                <button id="newChallengeBtn" class="btn btn-primary">
                    <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                    New Challenge
                </button>
                <button id="restartBtn" class="btn btn-outline">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                    Restart
                </button>
            </div>

            <!-- Completion Message -->
            <div id="completionMessage" class="completion-message" style="display: none;">
                <div class="message-badge">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: #c084fc;">
                        <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2z"/>
                    </svg>
                    <span class="message-text">Time's up — that was smooth 😌🔥</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: #facc15;">
                        <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2z"/>
                    </svg>
                </div>
                <div id="achievements" class="achievements"></div>
            </div>
        </div>
    </div>

    <!-- Background Elements -->
    <div class="grid-bg"></div>
    <div class="particles-container" id="particlesContainer"></div>
    <div id="particleEffect" class="particle-effect" style="display: none;"></div>

    <script>
        // Sample texts
        const samples = [
            "Typing is not just about speed; it is about rhythm, focus, and clarity. Start slow, aim for accuracy, and let your fingers build muscle memory. As you practice, try to keep your eyes slightly ahead of what you are typing. This small habit reduces hesitation and makes your flow smoother. Remember: calm hands, steady breathing, and consistent practice will always beat rushing.",
            "When you learn to type better, you are training your brain to think in a clean sequence. First, understand the sentence. Next, trust your fingers to do the work. If you make a mistake, do not panic—just continue. Over time, your accuracy improves naturally, and speed follows. The best typists are not the ones who push hardest; they are the ones who stay relaxed and consistent.",
            "React apps feel magical when your UI responds instantly to user actions. But behind the scenes, it is a simple loop: state changes, components re-render, and the screen updates. The same idea applies to typing practice. Your input is the state, your accuracy is the feedback, and your improvement is the final render. Practice daily for a few minutes, and your progress will surprise you.",
            "A good warm-up can refresh your mind. Type this paragraph smoothly and keep your shoulders relaxed. Do not slam the keys; use light presses. Try to maintain a steady tempo like a song. If you lose the rhythm, slow down, correct your posture, and start again. Consistency is the secret ingredient that makes you faster without feeling stressed."
        ];

        // Utility functions
        function pickRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function countWords(str) {
            const trimmed = str.trim();
            if (!trimmed) return 0;
            return trimmed.split(/\s+/).length;
        }

        function getTimeForText(str) {
            const words = countWords(str);
            const raw = Math.round((words / 25) * 60);
            return Math.min(300, Math.max(60, raw));
        }

        // Game state
        let state = {
            text: '',
            input: '',
            timeTotal: 30,
            timeLeft: 30,
            started: false,
            finished: false,
            achievements: [],
            lastKeyPressed: '',
            prevWPM: 0,
            showAchievement: false
        };

        // DOM Elements
        const elements = {
            timerValue: document.getElementById('timerValue'),
            progressFill: document.getElementById('progressFill'),
            progressHandle: document.getElementById('progressHandle'),
            textDisplay: document.getElementById('textDisplay'),
            typingInput: document.getElementById('typingInput'),
            keyPressIndicator: document.getElementById('keyPressIndicator'),
            wpmValue: document.getElementById('wpmValue'),
            accuracyValue: document.getElementById('accuracyValue'),
            charsValue: document.getElementById('charsValue'),
            wordsValue: document.getElementById('wordsValue'),
            completionMessage: document.getElementById('completionMessage'),
            achievements: document.getElementById('achievements'),
            achievementPopup: document.getElementById('achievementPopup'),
            particleEffect: document.getElementById('particleEffect'),
            typingArea: document.getElementById('typingArea'),
            keyHints: document.querySelectorAll('.key-hint')
        };

        // Initialize particles
        function initParticles() {
            const container = document.getElementById('particlesContainer');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }

        // Particle effect
        function showParticleEffect() {
            const effect = elements.particleEffect;
            effect.style.display = 'block';
            
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle-effect-particle';
                
                const angle = (i / 20) * Math.PI * 2;
                const distance = 100 + Math.random() * 100;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                particle.style.left = '50%';
                particle.style.top = '50%';
                particle.style.animation = 'particle 1.5s ease-out forwards';
                
                effect.appendChild(particle);
                
                setTimeout(() => particle.remove(), 1500);
            }
            
            setTimeout(() => {
                effect.style.display = 'none';
            }, 2000);
        }

        // Achievement popup
        function showAchievementPopup(type) {
            const popup = elements.achievementPopup;
            popup.style.display = 'flex';
            
            setTimeout(() => {
                popup.style.display = 'none';
            }, 3000);
        }

        // Update text display
        function updateTextDisplay() {
            const { text, input, finished } = state;
            let html = '';
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                let className = 'text-char';
                
                if (input[i] != null) {
                    className += input[i] === char ? ' correct' : ' incorrect';
                } else if (i === input.length && !finished) {
                    className += ' current';
                } else {
                    className += ' text-gray-500';
                }
                
                html += `<span class="${className}">${char}</span>`;
            }
            
            elements.textDisplay.innerHTML = html;
        }

        // Update stats
        function updateStats() {
            const { input, text, started, timeTotal, timeLeft, achievements } = state;
            
            // Calculate elapsed seconds
            const elapsedSeconds = started ? Math.max(1, timeTotal - timeLeft) : 1;
            
            // Calculate WPM
            const wordsTyped = countWords(input);
            const minutes = elapsedSeconds / 60;
            const wpm = Math.round(wordsTyped / minutes) || 0;
            
            // Calculate accuracy
            let correctChars = 0;
            for (let i = 0; i < input.length; i++) {
                if (input[i] === text[i]) correctChars++;
            }
            const accuracy = Math.round((correctChars / Math.max(input.length, 1)) * 100) || 0;
            
            // Update DOM with animation
            updateValueWithAnimation(elements.wpmValue, wpm);
            updateValueWithAnimation(elements.accuracyValue, accuracy + '%');
            updateValueWithAnimation(elements.charsValue, input.length);
            updateValueWithAnimation(elements.wordsValue, countWords(input));
            
            // Check for achievements
            if (started && !state.finished) {
                if (wpm > 50 && !achievements.includes('speed')) {
                    state.achievements = [...achievements, 'speed'];
                    showAchievementPopup('speed');
                }
                if (accuracy > 95 && !achievements.includes('accuracy')) {
                    state.achievements = [...achievements, 'accuracy'];
                    showAchievementPopup('accuracy');
                }
            }
            
            // Update WPM trend
            const trend = wpm > state.prevWPM ? 'up' : wpm < state.prevWPM ? 'down' : 'stable';
            updateTrendIndicator(trend);
            state.prevWPM = wpm;
            
            // Update key hints
            if (wpm > 40) {
                elements.keyHints.forEach(hint => hint.classList.add('active'));
            } else {
                elements.keyHints.forEach(hint => hint.classList.remove('active'));
            }
        }

        function updateValueWithAnimation(element, value) {
            if (element.textContent !== value.toString()) {
                element.classList.add('changed');
                element.textContent = value;
                setTimeout(() => element.classList.remove('changed'), 200);
            }
        }

        function updateTrendIndicator(trend) {
            // Remove existing trend indicators
            document.querySelectorAll('.trend-indicator').forEach(el => el.remove());
            
            if (trend === 'up') {
                const indicator = document.createElement('span');
                indicator.className = 'trend-indicator';
                indicator.innerHTML = '↑';
                indicator.style.color = '#4ade80';
                elements.wpmValue.appendChild(indicator);
            } else if (trend === 'down') {
                const indicator = document.createElement('span');
                indicator.className = 'trend-indicator';
                indicator.innerHTML = '↓';
                indicator.style.color = '#f87171';
                elements.wpmValue.appendChild(indicator);
            }
        }

        // Timer
        function startTimer() {
            if (state.finished) return;
            
            const timer = setInterval(() => {
                if (!state.started || state.finished) {
                    clearInterval(timer);
                    return;
                }
                
                if (state.timeLeft <= 0) {
                    state.finished = true;
                    state.timeLeft = 0;
                    clearInterval(timer);
                    
                    // Update UI for completion
                    elements.completionMessage.style.display = 'block';
                    elements.typingInput.disabled = true;
                    showParticleEffect();
                    
                    // Show achievements
                    updateAchievements();
                } else {
                    state.timeLeft--;
                    
                    // Animate timer
                    elements.timerValue.classList.add('changed');
                    elements.timerValue.textContent = state.timeLeft + 's';
                    setTimeout(() => elements.timerValue.classList.remove('changed'), 200);
                    
                    // Update progress
                    const progress = (state.timeLeft / state.timeTotal) * 100;
                    elements.progressFill.style.width = progress + '%';
                    elements.progressHandle.style.left = progress + '%';
                }
                
                updateStats();
            }, 1000);
        }

        // Update achievements display
        function updateAchievements() {
            const { achievements } = state;
            let html = '';
            
            if (achievements.includes('speed')) {
                html += `
                    <div class="achievement-badge achievement-speed">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2z"/>
                        </svg>
                        Speed Demon
                    </div>
                `;
            }
            
            if (achievements.includes('accuracy')) {
                html += `
                    <div class="achievement-badge achievement-accuracy">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2z"/>
                        </svg>
                        Precision Master
                    </div>
                `;
            }
            
            elements.achievements.innerHTML = html;
        }

        // Reset game
        function resetGame() {
            const nextText = pickRandom(samples);
            const time = getTimeForText(nextText);
            
            state = {
                ...state,
                text: nextText,
                input: '',
                timeTotal: time,
                timeLeft: time,
                started: false,
                finished: false,
                achievements: [],
                lastKeyPressed: ''
            };
            
            // Update UI
            elements.typingInput.value = '';
            elements.typingInput.disabled = false;
            elements.completionMessage.style.display = 'none';
            elements.timerValue.textContent = time + 's';
            
            const progress = 100;
            elements.progressFill.style.width = progress + '%';
            elements.progressHandle.style.left = progress + '%';
            
            updateTextDisplay();
            updateStats();
            updateAchievements();
            
            // Focus input
            elements.typingInput.focus();
        }

        // Initialize game
        function initGame() {
            initParticles();
            resetGame();
            
            // Event listeners
            elements.typingInput.addEventListener('input', (e) => {
                if (!state.started) {
                    state.started = true;
                    startTimer();
                    elements.typingArea.classList.add('active');
                }
                
                state.input = e.target.value;
                updateTextDisplay();
                updateStats();
            });
            
            elements.typingInput.addEventListener('keydown', (e) => {
                if (e.key.length === 1) {
                    // Show key press indicator
                    const indicator = elements.keyPressIndicator;
                    indicator.textContent = e.key;
                    indicator.style.display = 'block';
                    
                    setTimeout(() => {
                        indicator.style.display = 'none';
                    }, 200);
                }
            });
            
            document.getElementById('newChallengeBtn').addEventListener('click', resetGame);
            
            document.getElementById('restartBtn').addEventListener('click', () => {
                state.input = '';
                state.timeLeft = state.timeTotal;
                state.started = false;
                state.finished = false;
                
                elements.typingInput.value = '';
                elements.typingInput.disabled = false;
                elements.completionMessage.style.display = 'none';
                elements.timerValue.textContent = state.timeTotal + 's';
                
                const progress = 100;
                elements.progressFill.style.width = progress + '%';
                elements.progressHandle.style.left = progress + '%';
                
                updateTextDisplay();
                updateStats();
                
                elements.typingInput.focus();
            });
        }

        // Start the game
        initGame();
    </script>
</body>
</html>
